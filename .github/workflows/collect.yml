name: Collect Parking Data

on:
  schedule:
    # UTC 기준 30분마다 실행 (한국시간 무관, 30분 간격이라 OK)
    - cron: '*/30 * * * *'
  workflow_dispatch:  # 수동 실행 버튼도 추가

# 동시 실행 방지: 이전 실행이 안 끝났으면 큐에 안 쌓고 그냥 스킵
concurrency:
  group: collect-parking
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 데이터 커밋하려면 필요

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and append data
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python scripts/collect.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/parking.csv
          # 변경사항 있을 때만 커밋 (실패해도 무시)
          git diff --staged --quiet || git commit -m "data: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
